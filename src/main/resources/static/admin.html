<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/main.css" rel="stylesheet">
    <link href="/css/admin.css" rel="stylesheet">
    <style>
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 999;
        }
        .sidebar-overlay.open { display: block; }

        .uploaded-image {
            position: relative;
            display: inline-block;
        }
        .uploaded-image .remove-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #e74c3c;
            color: #fff;
            border: none;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .uploaded-image .remove-btn:hover { background: #c0392b; }

        @media (max-width: 767px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: inline-block !important; }
        }
        .menu-toggle { display: none; }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="container-fluid">
    <div class="row">
        <!-- ===== 侧边栏 ===== -->
        <nav class="col-md-3 col-lg-2 d-md-block sidebar" id="sidebarMenu">
            <div class="brand">
                <i class="fas fa-utensils"></i>
                <span>菜单管理</span>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active" data-tab="menu" href="#" onclick="switchTab('menu')">
                        <i class="fas fa-utensils"></i>菜单管理
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-tab="recipe" href="#" onclick="switchTab('recipe')">
                        <i class="fas fa-book"></i>菜谱管理
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-tab="category" href="#" onclick="switchTab('category')">
                        <i class="fas fa-tags"></i>分类管理
                    </a>
                </li>
                <hr>
                <li class="nav-item">
                    <a class="nav-link" href="/"><i class="fas fa-home"></i>返回首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i>退出登录</a>
                </li>
            </ul>
        </nav>

        <!-- ===== 主内容 ===== -->
        <main class="col-md-9 col-lg-10 main-content">
            <!-- 顶部栏 -->
            <div class="top-bar">
                <div class="d-flex align-items-center gap-2">
                    <button class="menu-toggle btn btn-sm btn-outline-secondary" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title" id="pageTitle"><i class="fas fa-utensils"></i>菜单管理</h1>
                </div>
                <div>
                    <button class="btn btn-primary btn-sm" id="addBtn" onclick="showAddMenuModal()">
                        <i class="fas fa-plus"></i> 新增
                    </button>
                </div>
            </div>

            <!-- ===== 内容区 ===== -->
            <div class="content-body">

                <!-- 菜单管理 -->
                <div id="menuTab">
                    <div class="table-wrapper">
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th class="d-none d-sm-table-cell">日期</th>
                                    <th>菜品</th>
                                    <th class="d-none d-md-table-cell">分类</th>
                                    <th class="d-none d-lg-table-cell">图片</th>
                                    <th style="width:140px;">操作</th>
                                </tr>
                                </thead>
                                <tbody id="menuTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 菜谱管理 -->
                <div id="recipeTab" style="display:none;">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <span style="font-weight:600;color:#2c3e50;"><i class="fas fa-book" style="color:#4CAF50;"></i> 菜谱列表</span>
                        <button class="btn btn-primary btn-sm" onclick="showAddRecipeModal()">
                            <i class="fas fa-plus"></i> 新增菜谱
                        </button>
                    </div>
                    <div class="row g-3" id="recipeContainer"></div>
                </div>

                <!-- 分类管理 -->
                <div id="categoryTab" style="display:none;">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <span style="font-weight:600;color:#2c3e50;"><i class="fas fa-tags" style="color:#4CAF50;"></i> 分类列表</span>
                        <div class="d-flex gap-2 flex-wrap">
                            <div class="btn-group btn-group-sm" role="group">
                                <button class="btn btn-outline-secondary active" onclick="filterCategoryType('all')">全部</button>
                                <button class="btn btn-outline-secondary" onclick="filterCategoryType('MENU')">菜单</button>
                                <button class="btn btn-outline-secondary" onclick="filterCategoryType('RECIPE')">菜谱</button>
                            </div>
                            <button class="btn btn-primary btn-sm" onclick="showAddCategoryModal()">
                                <i class="fas fa-plus"></i> 新增分类
                            </button>
                        </div>
                    </div>
                    <div class="table-wrapper">
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                <tr><th>ID</th><th>名称</th><th>类型</th><th>排序</th><th style="width:140px;">操作</th></tr>
                                </thead>
                                <tbody id="categoryTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>

<!-- ===== 菜单模态框 ===== -->
<div class="modal fade" id="menuModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="menuModalTitle">新增菜单</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="menuForm" onsubmit="saveMenu(event)">
                    <input type="hidden" id="menuId">
                    <div class="row g-3">
                        <div class="col-12 col-sm-6">
                            <label class="form-label">日期 *</label>
                            <input type="date" class="form-control" id="menuDate" required>
                        </div>
                        <div class="col-12 col-sm-6">
                            <label class="form-label">分类 *</label>
                            <select class="form-select" id="menuCategory" required></select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">菜品名称 *</label>
                            <input type="text" class="form-control" id="menuName" required>
                        </div>

                        <!-- ===== 菜单图片上传 ===== -->
                        <div class="col-12">
                            <label class="form-label">菜品图片</label>
                            <div class="d-flex flex-wrap gap-2 mb-2" id="menuImagePreview"></div>
                            <div class="input-group">
                                <input type="file" class="form-control" id="menuImageFileInput"
                                       accept="image/*" onchange="uploadMenuImage(this)">
                                <button class="btn btn-outline-secondary" type="button" onclick="document.getElementById('menuImageFileInput').click()">
                                    <i class="fas fa-cloud-upload-alt"></i> 选择图片
                                </button>
                            </div>
                            <small class="text-muted">支持 jpg, png, gif, webp，单张不超过5MB</small>
                            <input type="hidden" id="menuImageUrl">
                        </div>

                        <div class="col-12">
                            <div class="card bg-light">
                                <div class="card-body">
                                    <div class="form-check form-check-inline">
                                        <input type="radio" name="recipeType" id="useRecipe" value="0" checked onchange="toggleRecipeType(0)">
                                        <label class="form-check-label" for="useRecipe">使用已有菜谱</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input type="radio" name="recipeType" id="customRecipe" value="1" onchange="toggleRecipeType(1)">
                                        <label class="form-check-label" for="customRecipe">自定义</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input type="radio" name="recipeType" id="newRecipe" value="2" onchange="toggleRecipeType(2)">
                                        <label class="form-check-label" for="newRecipe">新增菜谱并关联</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-12" id="recipeSelectDiv">
                            <label class="form-label">选择菜谱</label>
                            <select class="form-select" id="menuRecipe"><option value="">-- 请选择 --</option></select>
                        </div>

                        <div class="col-12" id="customContentDiv" style="display:none;">
                            <label class="form-label">自定义内容</label>
                            <textarea class="form-control" id="menuCustomContent" rows="3"></textarea>
                        </div>

                        <div class="col-12 d-none" id="newRecipeDiv">
                            <div class="card">
                                <div class="card-header bg-primary text-white"><i class="fas fa-plus me-2"></i>新增菜谱</div>
                                <div class="card-body">
                                    <div class="row g-3">
                                        <div class="col-12"><label class="form-label">菜谱名称 *</label><input type="text" class="form-control" id="newRecipeName"></div>
                                        <div class="col-12 col-sm-6"><label class="form-label">菜谱分类 *</label><select class="form-select" id="newRecipeCategory"></select></div>
                                        <div class="col-12 col-sm-6"><label class="form-label">难度</label><select class="form-select" id="newRecipeDifficulty"><option value="EASY">简单</option><option value="MEDIUM" selected>中等</option><option value="HARD">困难</option></select></div>
                                        <div class="col-12"><label class="form-label">描述</label><textarea class="form-control" id="newRecipeDescription" rows="2"></textarea></div>
                                        <div class="col-12"><label class="form-label">制作方法</label><textarea class="form-control" id="newRecipeContent" rows="4" placeholder="详细步骤..."></textarea></div>

                                        <!-- ===== 新增：新菜谱图片上传 ===== -->
                                        <div class="col-12">
                                            <label class="form-label">菜谱图片</label>
                                            <div class="d-flex flex-wrap gap-2 mb-2" id="newRecipeImagePreview"></div>
                                            <div class="input-group">
                                                <input type="file" class="form-control" id="newRecipeImageInput"
                                                       accept="image/*" multiple onchange="uploadNewRecipeImages(this)">
                                                <button class="btn btn-outline-secondary" type="button" onclick="document.getElementById('newRecipeImageInput').click()">
                                                    <i class="fas fa-cloud-upload-alt"></i> 选择图片
                                                </button>
                                            </div>
                                            <small class="text-muted">支持 jpg, png, gif, webp，单张不超过5MB，可多选</small>
                                        </div>

                                        <div class="col-12 col-sm-6"><label class="form-label">准备时间（分钟）</label><input type="number" class="form-control" id="newRecipePrepTime" value="10"></div>
                                        <div class="col-12 col-sm-6"><label class="form-label">烹饪时间（分钟）</label><input type="number" class="form-control" id="newRecipeCookTime" value="20"></div>
                                        <div class="col-12"><div class="form-check"><input type="checkbox" class="form-check-input" id="newRecipePublic" checked><label class="form-check-label">公开此菜谱</label></div></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-12"><label class="form-label">描述</label><textarea class="form-control" id="menuDescription" rows="2"></textarea></div>
                        <div class="col-12 col-sm-6"><label class="form-label">排序</label><input type="number" class="form-control" id="menuSort" value="0"></div>
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>保存</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- ===== 菜谱模态框 ===== -->
<div class="modal fade" id="recipeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="recipeModalTitle">新增菜谱</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="recipeForm" onsubmit="saveRecipe(event)">
                    <input type="hidden" id="recipeId">
                    <div class="row g-3">
                        <div class="col-12"><label class="form-label">菜谱名称 *</label><input type="text" class="form-control" id="recipeName" required></div>
                        <div class="col-12 col-sm-6"><label class="form-label">分类 *</label><select class="form-select" id="recipeCategory" required></select></div>
                        <div class="col-12 col-sm-6"><label class="form-label">难度</label><select class="form-select" id="recipeDifficulty"><option value="EASY">简单</option><option value="MEDIUM" selected>中等</option><option value="HARD">困难</option></select></div>
                        <div class="col-12"><label class="form-label">描述</label><textarea class="form-control" id="recipeDescription" rows="2"></textarea></div>
                        <div class="col-12"><label class="form-label">制作方法</label><textarea class="form-control" id="recipeContent" rows="4" placeholder="详细步骤..."></textarea></div>

                        <!-- ===== 菜谱图片上传 ===== -->
                        <div class="col-12">
                            <label class="form-label">菜谱图片</label>
                            <div class="d-flex flex-wrap gap-2 mb-2" id="recipeImagePreview"></div>
                            <div class="input-group">
                                <input type="file" class="form-control" id="recipeImageFileInput"
                                       accept="image/*" multiple onchange="uploadRecipeImages(this)">
                                <button class="btn btn-outline-secondary" type="button" onclick="document.getElementById('recipeImageFileInput').click()">
                                    <i class="fas fa-cloud-upload-alt"></i> 选择图片
                                </button>
                            </div>
                            <small class="text-muted">支持 jpg, png, gif, webp，单张不超过5MB，可多选</small>
                        </div>

                        <div class="col-12 col-sm-6"><label class="form-label">准备时间（分钟）</label><input type="number" class="form-control" id="recipePrepTime" value="10"></div>
                        <div class="col-12 col-sm-6"><label class="form-label">烹饪时间（分钟）</label><input type="number" class="form-control" id="recipeCookTime" value="20"></div>
                        <div class="col-12"><div class="form-check"><input type="checkbox" class="form-check-input" id="recipePublic" checked><label class="form-check-label">公开此菜谱</label></div></div>
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>保存</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- ===== 菜谱查看模态框 ===== -->
<div class="modal fade" id="recipeViewModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="recipeViewTitle">菜谱详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="recipeViewContent"></div>
        </div>
    </div>
</div>

<!-- ===== 分类模态框 ===== -->
<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="categoryModalTitle">新增分类</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="categoryForm" onsubmit="saveCategory(event)">
                    <input type="hidden" id="categoryId">
                    <div class="mb-3"><label class="form-label">分类名称 *</label><input type="text" class="form-control" id="categoryName" required></div>
                    <div class="mb-3"><label class="form-label">类型 *</label><select class="form-select" id="categoryType" required><option value="MENU">菜单分类</option><option value="RECIPE">菜谱分类</option></select></div>
                    <div class="mb-3"><label class="form-label">排序</label><input type="number" class="form-control" id="categorySort" value="0"></div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>保存</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- ===== Toast ===== -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:1050">
    <div id="liveToast" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
