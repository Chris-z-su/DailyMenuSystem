<!-- admin.html - 管理后台 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/admin.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- 侧边栏 - 响应式 -->
        <nav class="col-md-3 col-lg-2 d-md-block bg-dark sidebar collapse" id="sidebarMenu">
            <div class="position-sticky pt-3">
                <div class="text-center mb-4">
                    <img src="/images/logo.svg" alt="Logo" width="40" height="40" class="rounded-circle bg-light p-1">
                    <h6 class="text-light mt-2 d-none d-lg-block">菜单管理系统</h6>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" onclick="loadMenus()">
                            <i class="fas fa-utensils me-2"></i>
                            <span class="d-none d-lg-inline">菜单管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="loadCategories()">
                            <i class="fas fa-tags me-2"></i>
                            <span class="d-none d-lg-inline">分类管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="loadRecipes()">
                            <i class="fas fa-book me-2"></i>
                            <span class="d-none d-lg-inline">菜谱管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showStatistics()">
                            <i class="fas fa-chart-bar me-2"></i>
                            <span class="d-none d-lg-inline">数据统计</span>
                        </a>
                    </li>
                    <li class="nav-item mt-4">
                        <a class="nav-link text-danger" href="/" onclick="logout()">
                            <i class="fas fa-sign-out-alt me-2"></i>
                            <span class="d-none d-lg-inline">退出登录</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- 主内容 -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2" id="pageTitle">菜单管理</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <button class="btn btn-sm btn-primary" onclick="showAddMenuModal()">
                        <i class="fas fa-plus me-1"></i>新增菜单
                    </button>
                </div>
            </div>

            <!-- 管理表格 - 响应式 -->
            <div class="table-responsive">
                <table class="table table-striped table-hover" id="menuTable">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th class="d-none d-sm-table-cell">日期</th>
                        <th>菜品</th>
                        <th class="d-none d-md-table-cell">分类</th>
                        <th class="d-none d-lg-table-cell">图片</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="menuTableBody">
                    <!-- 动态加载 -->
                    </tbody>
                </table>
            </div>

            <!-- 分页 - 响应式 -->
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center flex-wrap" id="pagination">
                    <!-- 动态生成 -->
                </ul>
            </nav>
        </main>
    </div>
</div>

<!-- 新增/编辑菜单模态框 -->
<div class="modal fade" id="menuModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="menuModalTitle">新增菜单</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="menuForm" onsubmit="saveMenu(event)">
                    <input type="hidden" id="menuId">

                    <div class="row g-3">
                        <div class="col-12 col-sm-6">
                            <label class="form-label">日期 *</label>
                            <input type="date" class="form-control" id="menuDate" required>
                        </div>
                        <div class="col-12 col-sm-6">
                            <label class="form-label">分类 *</label>
                            <select class="form-select" id="menuCategory" required>
                                <!-- 动态加载 -->
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">菜品名称 *</label>
                            <input type="text" class="form-control" id="menuName" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">描述</label>
                            <textarea class="form-control" id="menuDescription" rows="2"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">图片URL</label>
                            <input type="text" class="form-control" id="menuImage" placeholder="http://example.com/image.jpg">
                        </div>
                        <div class="col-12 col-sm-6">
                            <label class="form-label">排序</label>
                            <input type="number" class="form-control" id="menuSort" value="0">
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-check mt-4">
                                <input type="checkbox" class="form-check-input" id="hasRecipe">
                                <label class="form-check-label">关联菜谱</label>
                            </div>
                        </div>
                    </div>

                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>保存
                        </button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
