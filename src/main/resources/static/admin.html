<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/main.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background: #2d3436; }
        .sidebar .nav-link { color: #b2bec3; padding: 0.75rem 1rem; }
        .sidebar .nav-link:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,0.15); }
        .sidebar .nav-link i { width: 20px; }
        .recipe-card { transition: all 0.3s; }
        .recipe-card:hover { transform: translateY(-3px); box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        @media (max-width: 767px) {
            .sidebar { position: fixed; top: 0; bottom: 0; left: 0; z-index: 1000; width: 280px; transform: translateX(-100%); transition: transform 0.3s; }
            .sidebar.show { transform: translateX(0); }
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- ===== 侧边栏 ===== -->
        <nav class="col-md-3 col-lg-2 d-md-block sidebar" id="sidebarMenu">
            <div class="position-sticky pt-3">
                <div class="text-center mb-4">
                    <i class="fas fa-utensils fa-2x text-light"></i>
                    <h6 class="text-light mt-2 d-none d-lg-block">菜单管理系统</h6>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" onclick="switchTab('menu')">
                            <i class="fas fa-utensils me-2"></i><span class="d-none d-lg-inline">菜单管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="switchTab('recipe')">
                            <i class="fas fa-book me-2"></i><span class="d-none d-lg-inline">菜谱管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="switchTab('category')">
                            <i class="fas fa-tags me-2"></i><span class="d-none d-lg-inline">分类管理</span>
                        </a>
                    </li>
                    <li class="nav-item mt-4">
                        <a class="nav-link text-danger" href="/" onclick="logout()">
                            <i class="fas fa-sign-out-alt me-2"></i><span class="d-none d-lg-inline">退出</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- ===== 主内容 ===== -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <!-- 头部 -->
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2" id="pageTitle">菜单管理</h1>
                <div class="btn-toolbar">
                    <button class="btn btn-sm btn-primary" id="addBtn" onclick="showAddMenuModal()">
                        <i class="fas fa-plus me-1"></i>新增菜单
                    </button>
                </div>
            </div>

            <!-- ===== 菜单管理 Tab ===== -->
            <div id="menuTab">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th class="d-none d-sm-table-cell">日期</th>
                            <th>菜品</th>
                            <th class="d-none d-md-table-cell">分类</th>
                            <th class="d-none d-lg-table-cell">图片</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="menuTableBody"></tbody>
                    </table>
                </div>
                <nav>
                    <ul class="pagination justify-content-center flex-wrap" id="pagination"></ul>
                </nav>
            </div>

            <!-- ===== 菜谱管理 Tab ===== -->
            <div id="recipeTab" style="display:none;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4><i class="fas fa-book me-2"></i>菜谱管理</h4>
                    <button class="btn btn-primary btn-sm" onclick="showAddRecipeModal()">
                        <i class="fas fa-plus me-1"></i>新增菜谱
                    </button>
                </div>
                <div class="row g-3" id="recipeContainer"></div>
            </div>

            <!-- ===== 分类管理 Tab ===== -->
            <div id="categoryTab" style="display:none;">
                <div class="alert alert-info">
                    <i class="fas fa-info-circle me-2"></i>分类管理功能开发中...
                </div>
            </div>
        </main>
    </div>
</div>

<!-- ===== 菜单模态框 ===== -->
<div class="modal fade" id="menuModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="menuModalTitle">新增菜单</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="menuForm" onsubmit="saveMenu(event)">
                    <input type="hidden" id="menuId">
                    <div class="row g-3">
                        <div class="col-12 col-sm-6">
                            <label class="form-label">日期 *</label>
                            <input type="date" class="form-control" id="menuDate" required>
                        </div>
                        <div class="col-12 col-sm-6">
                            <label class="form-label">分类 *</label>
                            <select class="form-select" id="menuCategory" required></select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">菜品名称 *</label>
                            <input type="text" class="form-control" id="menuName" required>
                        </div>

                        <!-- 菜谱类型选择 -->
                        <div class="col-12">
                            <div class="card bg-light">
                                <div class="card-body">
                                    <div class="form-check form-check-inline">
                                        <input type="radio" name="recipeType" id="useRecipe" value="0" checked onchange="toggleRecipeType(0)">
                                        <label class="form-check-label" for="useRecipe">使用已有菜谱</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input type="radio" name="recipeType" id="customRecipe" value="1" onchange="toggleRecipeType(1)">
                                        <label class="form-check-label" for="customRecipe">自定义（不保存）</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input type="radio" name="recipeType" id="newRecipe" value="2" onchange="toggleRecipeType(2)">
                                        <label class="form-check-label" for="newRecipe">新增菜谱并关联</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 选择已有菜谱 -->
                        <div class="col-12" id="recipeSelectDiv">
                            <label class="form-label">选择菜谱</label>
                            <select class="form-select" id="menuRecipe">
                                <option value="">-- 请选择 --</option>
                            </select>
                        </div>

                        <!-- 自定义内容 -->
                        <div class="col-12" id="customContentDiv" style="display:none;">
                            <label class="form-label">自定义内容</label>
                            <textarea class="form-control" id="menuCustomContent" rows="3"></textarea>
                        </div>

                        <!-- 新增菜谱 -->
                        <div class="col-12 d-none" id="newRecipeDiv">
                            <div class="card">
                                <div class="card-header bg-primary text-white"><i class="fas fa-plus me-2"></i>新增菜谱</div>
                                <div class="card-body">
                                    <div class="row g-3">
                                        <div class="col-12"><label class="form-label">菜谱名称 *</label><input type="text" class="form-control" id="newRecipeName"></div>
                                        <div class="col-12 col-sm-6"><label class="form-label">菜谱分类 *</label><select class="form-select" id="newRecipeCategory"></select></div>
                                        <div class="col-12 col-sm-6"><label class="form-label">难度</label><select class="form-select" id="newRecipeDifficulty"><option value="EASY">简单</option><option value="MEDIUM" selected>中等</option><option value="HARD">困难</option></select></div>
                                        <div class="col-12"><label class="form-label">描述</label><textarea class="form-control" id="newRecipeDescription" rows="2"></textarea></div>
                                        <div class="col-12"><label class="form-label">制作方法</label><textarea class="form-control" id="newRecipeContent" rows="4" placeholder="详细步骤..."></textarea></div>
                                        <div class="col-12 col-sm-6"><label class="form-label">准备时间（分钟）</label><input type="number" class="form-control" id="newRecipePrepTime" value="10"></div>
                                        <div class="col-12 col-sm-6"><label class="form-label">烹饪时间（分钟）</label><input type="number" class="form-control" id="newRecipeCookTime" value="20"></div>
                                        <div class="col-12"><div class="form-check"><input type="checkbox" class="form-check-input" id="newRecipePublic" checked><label class="form-check-label">公开此菜谱</label></div></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-12"><label class="form-label">描述</label><textarea class="form-control" id="menuDescription" rows="2"></textarea></div>
                        <div class="col-12"><label class="form-label">图片URL</label><input type="text" class="form-control" id="menuImage" placeholder="http://example.com/image.jpg"></div>
                        <div class="col-12 col-sm-6"><label class="form-label">排序</label><input type="number" class="form-control" id="menuSort" value="0"></div>
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>保存</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- ===== 菜谱模态框 ===== -->
<div class="modal fade" id="recipeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="recipeModalTitle">新增菜谱</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="recipeForm" onsubmit="saveRecipe(event)">
                    <input type="hidden" id="recipeId">
                    <div class="row g-3">
                        <div class="col-12"><label class="form-label">菜谱名称 *</label><input type="text" class="form-control" id="recipeName" required></div>
                        <div class="col-12 col-sm-6"><label class="form-label">分类 *</label><select class="form-select" id="recipeCategory" required></select></div>
                        <div class="col-12 col-sm-6"><label class="form-label">难度</label><select class="form-select" id="recipeDifficulty"><option value="EASY">简单</option><option value="MEDIUM" selected>中等</option><option value="HARD">困难</option></select></div>
                        <div class="col-12"><label class="form-label">描述</label><textarea class="form-control" id="recipeDescription" rows="2"></textarea></div>
                        <div class="col-12"><label class="form-label">制作方法</label><textarea class="form-control" id="recipeContent" rows="4" placeholder="详细步骤..."></textarea></div>
                        <div class="col-12 col-sm-6"><label class="form-label">准备时间（分钟）</label><input type="number" class="form-control" id="recipePrepTime" value="10"></div>
                        <div class="col-12 col-sm-6"><label class="form-label">烹饪时间（分钟）</label><input type="number" class="form-control" id="recipeCookTime" value="20"></div>
                        <div class="col-12"><div class="form-check"><input type="checkbox" class="form-check-input" id="recipePublic" checked><label class="form-check-label">公开此菜谱</label></div></div>
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>保存</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- ===== 菜谱查看模态框 ===== -->
<div class="modal fade" id="recipeViewModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="recipeViewTitle">菜谱详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="recipeViewContent"></div>
        </div>
    </div>
</div>

<!-- ===== Toast ===== -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:1050">
    <div id="liveToast" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
