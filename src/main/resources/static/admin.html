<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/main.css" rel="stylesheet">
    <style>
        /* 侧边栏样式 */
        .sidebar {
            min-height: 100vh;
            background: #2d3436;
        }
        .sidebar .nav-link {
            color: #b2bec3;
            padding: 0.75rem 1rem;
            border-radius: 0;
        }
        .sidebar .nav-link:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }
        .sidebar .nav-link.active {
            color: #fff;
            background: rgba(255,255,255,0.15);
        }
        .sidebar .nav-link i {
            width: 20px;
        }
        .sidebar .brand {
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar .brand h6 {
            color: #fff;
            margin-top: 0.5rem;
        }

        /* 顶部导航栏 */
        .top-bar {
            background: white;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .top-bar .page-title {
            margin: 0;
            font-size: 1.25rem;
        }

        /* 主内容区域 */
        .main-content {
            padding: 1.5rem;
        }

        /* 菜谱卡片 */
        .recipe-card {
            transition: all 0.3s;
            height: 100%;
        }
        .recipe-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        /* 移动端适配 */
        @media (max-width: 767px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                z-index: 1000;
                width: 280px;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                overflow-y: auto;
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .sidebar-overlay {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
                display: none;
            }
            .sidebar-overlay.show {
                display: block;
            }
            .top-bar {
                padding: 0.5rem 1rem;
            }
            .top-bar .page-title {
                font-size: 1rem;
            }
            .main-content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
<!-- 侧边栏遮罩（移动端） -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="admin-wrapper">
    <!-- ===== 侧边栏 ===== -->
    <nav class="sidebar" id="sidebarMenu">
        <div class="brand">
            <i class="fas fa-utensils fa-2x text-light"></i>
            <h6>菜单管理系统</h6>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link active" href="#" onclick="switchTab('menu')">
                    <i class="fas fa-utensils me-2"></i>菜单管理
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="switchTab('recipe')">
                    <i class="fas fa-book me-2"></i>菜谱管理
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="switchTab('category')">
                    <i class="fas fa-tags me-2"></i>分类管理
                </a>
            </li>
            <li class="nav-item" style="border-top: 1px solid rgba(255,255,255,0.1); margin-top: 1rem; padding-top: 1rem;">
                <a class="nav-link" href="/" onclick="goHome(event)">
                    <i class="fas fa-home me-2"></i>返回首页
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-danger" href="#" onclick="logout()">
                    <i class="fas fa-sign-out-alt me-2"></i>退出登录
                </a>
            </li>
        </ul>
    </nav>

    <!-- ===== 主内容 ===== -->
    <div class="main-content">
        <!-- 顶部栏 -->
        <div class="top-bar">
            <div class="d-flex align-items-center">
                <!-- 移动端菜单切换按钮 -->
                <button class="btn btn-sm btn-outline-secondary me-2 d-md-none" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title" id="pageTitle">菜单管理</h1>
            </div>
            <div>
                <a href="/" class="btn btn-sm btn-outline-primary me-2" title="返回首页">
                    <i class="fas fa-home"></i>
                    <span class="d-none d-sm-inline">首页</span>
                </a>
            </div>
        </div>

        <!-- ===== 菜单管理 Tab ===== -->
        <div id="menuTab">
            <div class="d-flex justify-content-between align-items-center py-4 mb-3">
                <h4><i class="fas fa-book me-2"></i>菜单管理</h4>
                <button class="btn btn-sm btn-primary" id="addBtn" onclick="showAddMenuModal()">
                    <i class="fas fa-plus me-1"></i>新增菜单
                </button>
            </div>
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th class="d-none d-sm-table-cell">日期</th>
                        <th>菜品</th>
                        <th class="d-none d-md-table-cell">分类</th>
                        <th class="d-none d-lg-table-cell">图片</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="menuTableBody"></tbody>
                </table>
            </div>
            <nav>
                <ul class="pagination justify-content-center flex-wrap" id="pagination"></ul>
            </nav>
        </div>

        <!-- ===== 菜谱管理 Tab ===== -->
        <div id="recipeTab" style="display:none;">
            <div class="d-flex justify-content-between align-items-center py-4 mb-3">
                <h4><i class="fas fa-book me-2"></i>菜谱管理</h4>
                <button class="btn btn-primary btn-sm" onclick="showAddRecipeModal()">
                    <i class="fas fa-plus me-1"></i>新增菜谱
                </button>
            </div>
            <div class="row g-3" id="recipeContainer"></div>
        </div>

        <!-- ===== 分类管理 Tab ===== -->
        <div id="categoryTab" style="display:none;">
            <div class="d-flex justify-content-between align-items-center py-4 mb-3">
                <h4><i class="fas fa-tags me-2"></i>分类管理</h4>
                <div class="btn-group">
                    <button class="btn btn-outline-secondary btn-sm" onclick="filterCategoryType('all')">全部</button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="filterCategoryType('MENU')">菜单分类</button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="filterCategoryType('RECIPE')">菜谱分类</button>
                    <button class="btn btn-primary btn-sm" onclick="showAddCategoryModal()">
                        <i class="fas fa-plus me-1"></i>新增分类
                    </button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>名称</th>
                        <th>类型</th>
                        <th>排序</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="categoryTableBody">
                    <!-- 动态加载 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- ===== 菜单模态框 ===== -->
<div class="modal fade" id="menuModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="menuModalTitle">新增菜单</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="menuForm" onsubmit="saveMenu(event)">
                    <input type="hidden" id="menuId">
                    <div class="row g-3">
                        <div class="col-12 col-sm-6">
                            <label class="form-label">日期 *</label>
                            <input type="date" class="form-control" id="menuDate" required>
                        </div>
                        <div class="col-12 col-sm-6">
                            <label class="form-label">分类 *</label>
                            <select class="form-select" id="menuCategory" required></select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">菜品名称 *</label>
                            <input type="text" class="form-control" id="menuName" required>
                        </div>

                        <div class="col-12">
                            <div class="card bg-light">
                                <div class="card-body">
                                    <div class="form-check form-check-inline">
                                        <input type="radio" name="recipeType" id="useRecipe" value="0" checked onchange="toggleRecipeType(0)">
                                        <label class="form-check-label" for="useRecipe">使用已有菜谱</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input type="radio" name="recipeType" id="customRecipe" value="1" onchange="toggleRecipeType(1)">
                                        <label class="form-check-label" for="customRecipe">自定义（不保存）</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input type="radio" name="recipeType" id="newRecipe" value="2" onchange="toggleRecipeType(2)">
                                        <label class="form-check-label" for="newRecipe">新增菜谱并关联</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-12" id="recipeSelectDiv">
                            <label class="form-label">选择菜谱</label>
                            <select class="form-select" id="menuRecipe">
                                <option value="">-- 请选择 --</option>
                            </select>
                        </div>

                        <div class="col-12" id="customContentDiv" style="display:none;">
                            <label class="form-label">自定义内容</label>
                            <textarea class="form-control" id="menuCustomContent" rows="3"></textarea>
                        </div>

                        <div class="col-12 d-none" id="newRecipeDiv">
                            <div class="card">
                                <div class="card-header bg-primary text-white"><i class="fas fa-plus me-2"></i>新增菜谱</div>
                                <div class="card-body">
                                    <div class="row g-3">
                                        <div class="col-12"><label class="form-label">菜谱名称 *</label><input type="text" class="form-control" id="newRecipeName"></div>
                                        <div class="col-12 col-sm-6"><label class="form-label">菜谱分类 *</label><select class="form-select" id="newRecipeCategory"></select></div>
                                        <div class="col-12 col-sm-6"><label class="form-label">难度</label><select class="form-select" id="newRecipeDifficulty"><option value="EASY">简单</option><option value="MEDIUM" selected>中等</option><option value="HARD">困难</option></select></div>
                                        <div class="col-12"><label class="form-label">描述</label><textarea class="form-control" id="newRecipeDescription" rows="2"></textarea></div>
                                        <div class="col-12"><label class="form-label">制作方法</label><textarea class="form-control" id="newRecipeContent" rows="4" placeholder="详细步骤..."></textarea></div>
                                        <div class="col-12 col-sm-6"><label class="form-label">准备时间（分钟）</label><input type="number" class="form-control" id="newRecipePrepTime" value="10"></div>
                                        <div class="col-12 col-sm-6"><label class="form-label">烹饪时间（分钟）</label><input type="number" class="form-control" id="newRecipeCookTime" value="20"></div>
                                        <div class="col-12"><div class="form-check"><input type="checkbox" class="form-check-input" id="newRecipePublic" checked><label class="form-check-label">公开此菜谱</label></div></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-12"><label class="form-label">描述</label><textarea class="form-control" id="menuDescription" rows="2"></textarea></div>
                        <div class="col-12"><label class="form-label">图片URL</label><input type="text" class="form-control" id="menuImage" placeholder="http://example.com/image.jpg"></div>
                        <div class="col-12 col-sm-6"><label class="form-label">排序</label><input type="number" class="form-control" id="menuSort" value="0"></div>
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>保存</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- ===== 菜谱模态框 ===== -->
<div class="modal fade" id="recipeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="recipeModalTitle">新增菜谱</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="recipeForm" onsubmit="saveRecipe(event)">
                    <input type="hidden" id="recipeId">
                    <div class="row g-3">
                        <div class="col-12"><label class="form-label">菜谱名称 *</label><input type="text" class="form-control" id="recipeName" required></div>
                        <div class="col-12 col-sm-6"><label class="form-label">分类 *</label><select class="form-select" id="recipeCategory" required></select></div>
                        <div class="col-12 col-sm-6"><label class="form-label">难度</label><select class="form-select" id="recipeDifficulty"><option value="EASY">简单</option><option value="MEDIUM" selected>中等</option><option value="HARD">困难</option></select></div>
                        <div class="col-12"><label class="form-label">描述</label><textarea class="form-control" id="recipeDescription" rows="2"></textarea></div>
                        <div class="col-12"><label class="form-label">制作方法</label><textarea class="form-control" id="recipeContent" rows="4" placeholder="详细步骤..."></textarea></div>
                        <!-- 菜谱图片上传 -->
                        <div class="col-12">
                            <label class="form-label">菜谱图片</label>
                            <div class="row g-2 mb-2" id="recipeImageList">
                                <!-- 已上传图片将动态渲染到这里 -->
                            </div>
                            <div class="input-group">
                                <input type="file" class="form-control" id="recipeImageInput"
                                       accept="image/*" multiple onchange="uploadRecipeImages(this)">
                                <button class="btn btn-outline-secondary" type="button" onclick="document.getElementById('recipeImageInput').click()">
                                    <i class="fas fa-cloud-upload-alt"></i> 选择图片
                                </button>
                            </div>
                            <small class="text-muted">支持 jpg, png, gif, webp，单张不超过5MB，可多选</small>
                        </div>
                        <div class="col-12 col-sm-6"><label class="form-label">准备时间（分钟）</label><input type="number" class="form-control" id="recipePrepTime" value="10"></div>
                        <div class="col-12 col-sm-6"><label class="form-label">烹饪时间（分钟）</label><input type="number" class="form-control" id="recipeCookTime" value="20"></div>
                        <div class="col-12"><div class="form-check"><input type="checkbox" class="form-check-input" id="recipePublic" checked><label class="form-check-label">公开此菜谱</label></div></div>
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>保存</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- ===== 菜谱查看模态框 ===== -->
<div class="modal fade" id="recipeViewModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="recipeViewTitle">菜谱详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="recipeViewContent"></div>
        </div>
    </div>
</div>

<!-- 新增/编辑分类模态框 -->
<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="categoryModalTitle">新增分类</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="categoryForm" onsubmit="saveCategory(event)">
                    <input type="hidden" id="categoryId">
                    <div class="mb-3">
                        <label class="form-label">分类名称 *</label>
                        <input type="text" class="form-control" id="categoryName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">类型 *</label>
                        <select class="form-select" id="categoryType" required>
                            <option value="MENU">菜单分类</option>
                            <option value="RECIPE">菜谱分类</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">排序</label>
                        <input type="number" class="form-control" id="categorySort" value="0">
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>保存</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- ===== Toast ===== -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:1050">
    <div id="liveToast" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
