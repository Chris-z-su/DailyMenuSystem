<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/admin.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- 侧边栏 -->
        <nav class="col-md-3 col-lg-2 d-md-block bg-dark sidebar collapse" id="sidebarMenu">
            <div class="position-sticky pt-3">
                <div class="text-center mb-4">
                    <i class="fas fa-utensils fa-2x text-light"></i>
                    <h6 class="text-light mt-2 d-none d-lg-block">菜单管理系统</h6>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link active" href="#" onclick="loadMenus()"><i class="fas fa-utensils me-2"></i><span class="d-none d-lg-inline">菜单管理</span></a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="loadRecipes()"><i class="fas fa-book me-2"></i><span class="d-none d-lg-inline">菜谱管理</span></a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="loadCategories()"><i class="fas fa-tags me-2"></i><span class="d-none d-lg-inline">分类管理</span></a></li>
                    <li class="nav-item mt-4"><a class="nav-link text-danger" href="/" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i><span class="d-none d-lg-inline">退出</span></a></li>
                </ul>
            </div>
        </nav>

        <!-- 主内容 -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2" id="pageTitle">菜单管理</h1>
                <div class="btn-toolbar">
                    <button class="btn btn-sm btn-primary" onclick="showAddMenuModal()"><i class="fas fa-plus me-1"></i>新增菜单</button>
                </div>
            </div>

            <!-- 菜单表格 -->
            <div class="table-responsive">
                <table class="table table-striped table-hover" id="menuTable">
                    <thead><tr><th>ID</th><th class="d-none d-sm-table-cell">日期</th><th>菜品</th><th class="d-none d-md-table-cell">分类</th><th class="d-none d-lg-table-cell">图片</th><th>操作</th></tr></thead>
                    <tbody id="menuTableBody"></tbody>
                </table>
            </div>
            <nav><ul class="pagination justify-content-center flex-wrap" id="pagination"></ul></nav>

            <!-- 菜谱管理区域（初始隐藏） -->
            <div id="recipeManagement" style="display:none;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4><i class="fas fa-book me-2"></i>菜谱管理</h4>
                    <button class="btn btn-primary btn-sm" onclick="showAddRecipeModal()"><i class="fas fa-plus me-1"></i>新增菜谱</button>
                </div>
                <div class="row g-3" id="recipeContainer"></div>
            </div>
        </main>
    </div>
</div>

<!-- 新增/编辑菜单模态框 -->
<div class="modal fade" id="menuModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="menuModalTitle">新增菜单</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="menuForm" onsubmit="saveMenu(event)">
                    <input type="hidden" id="menuId">
                    <div class="row g-3">
                        <div class="col-12 col-sm-6"><label class="form-label">日期 *</label><input type="date" class="form-control" id="menuDate" required></div>
                        <div class="col-12 col-sm-6"><label class="form-label">分类 *</label><select class="form-select" id="menuCategory" required></select></div>
                        <div class="col-12"><label class="form-label">菜品名称 *</label><input type="text" class="form-control" id="menuName" required></div>
                        <div class="col-12">
                            <div class="card bg-light">
                                <div class="card-body">
                                    <div class="form-check form-check-inline"><input type="radio" name="recipeType" id="useRecipe" value="0" checked onchange="toggleRecipeType(0)"><label class="form-check-label" for="useRecipe">使用已有菜谱</label></div>
                                    <div class="form-check form-check-inline"><input type="radio" name="recipeType" id="customRecipe" value="1" onchange="toggleRecipeType(1)"><label class="form-check-label" for="customRecipe">自定义（不保存）</label></div>
                                    <div class="form-check form-check-inline"><input type="radio" name="recipeType" id="newRecipe" value="2" onchange="toggleRecipeType(2)"><label class="form-check-label" for="newRecipe">新增菜谱并关联</label></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12" id="recipeSelectDiv"><label class="form-label">选择菜谱</label><select class="form-select" id="menuRecipe"><option value="">-- 请选择 --</option></select></div>
                        <div class="col-12 d-none" id="newRecipeDiv">
                            <div class="card">
                                <div class="card-header bg-primary text-white"><i class="fas fa-plus me-2"></i>新增菜谱</div>
                                <div class="card-body">
                                    <div class="row g-3">
                                        <div class="col-12"><label class="form-label">菜谱名称 *</label><input type="text" class="form-control" id="newRecipeName"></div>
                                        <div class="col-12 col-sm-6"><label class="form-label">菜谱分类 *</label><select class="form-select" id="newRecipeCategory"></select></div>
                                        <div class="col-12 col-sm-6"><label class="form-label">难度</label><select class="form-select" id="newRecipeDifficulty"><option value="EASY">简单</option><option value="MEDIUM" selected>中等</option><option value="HARD">困难</option></select></div>
                                        <div class="col-12"><label class="form-label">描述</label><textarea class="form-control" id="newRecipeDescription" rows="2"></textarea></div>
                                        <div class="col-12"><label class="form-label">制作方法</label><textarea class="form-control" id="newRecipeContent" rows="4" placeholder="详细步骤..."></textarea></div>
                                        <div class="col-12 col-sm-6"><label class="form-label">准备时间（分钟）</label><input type="number" class="form-control" id="newRecipePrepTime" value="10"></div>
                                        <div class="col-12 col-sm-6"><label class="form-label">烹饪时间（分钟）</label><input type="number" class="form-control" id="newRecipeCookTime" value="20"></div>
                                        <div class="col-12"><div class="form-check"><input type="checkbox" class="form-check-input" id="newRecipePublic" checked><label class="form-check-label">公开此菜谱</label></div></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12"><label class="form-label">描述</label><textarea class="form-control" id="menuDescription" rows="2"></textarea></div>
                        <div class="col-12"><label class="form-label">图片URL</label><input type="text" class="form-control" id="menuImage" placeholder="http://example.com/image.jpg"></div>
                        <div class="col-12 col-sm-6"><label class="form-label">排序</label><input type="number" class="form-control" id="menuSort" value="0"></div>
                    </div>
                    <div class="mt-3"><button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>保存</button><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button></div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- 新增/编辑菜谱模态框 -->
<div class="modal fade" id="recipeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="recipeModalTitle">新增菜谱</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="recipeForm" onsubmit="saveRecipe(event)">
                    <input type="hidden" id="recipeId">
                    <div class="row g-3">
                        <div class="col-12"><label class="form-label">菜谱名称 *</label><input type="text" class="form-control" id="recipeName" required></div>
                        <div class="col-12 col-sm-6"><label class="form-label">分类 *</label><select class="form-select" id="recipeCategory" required></select></div>
                        <div class="col-12 col-sm-6"><label class="form-label">难度</label><select class="form-select" id="recipeDifficulty"><option value="EASY">简单</option><option value="MEDIUM" selected>中等</option><option value="HARD">困难</option></select></div>
                        <div class="col-12"><label class="form-label">描述</label><textarea class="form-control" id="recipeDescription" rows="2"></textarea></div>
                        <div class="col-12"><label class="form-label">制作方法</label><textarea class="form-control" id="recipeContent" rows="4" placeholder="详细步骤..."></textarea></div>
                        <div class="col-12 col-sm-6"><label class="form-label">准备时间（分钟）</label><input type="number" class="form-control" id="recipePrepTime" value="10"></div>
                        <div class="col-12 col-sm-6"><label class="form-label">烹饪时间（分钟）</label><input type="number" class="form-control" id="recipeCookTime" value="20"></div>
                        <div class="col-12"><div class="form-check"><input type="checkbox" class="form-check-input" id="recipePublic" checked><label class="form-check-label">公开此菜谱</label></div></div>
                    </div>
                    <div class="mt-3"><button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>保存</button><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button></div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- 菜谱查看模态框 -->
<div class="modal fade" id="recipeViewModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="recipeViewTitle">菜谱详情</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body" id="recipeViewContent"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
