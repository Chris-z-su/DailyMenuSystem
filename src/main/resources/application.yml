# application.yml
spring:
  application:
    name: DailyMenuSystem

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://43.138.36.182:3306/daily_menu?useSSL=false&serverTimezone=Asia/Shanghai
    username: admin
    password: 1106135
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  mvc:
    static-path-pattern: /**

  web:
    resources:
      static-locations: classpath:/static/

server:
  port: 8080
  servlet:
    context-path: /
    session:
      timeout: 3600

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.shubao.entity
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: daily-menu-secret-key-2024
  expire: 7200000 # 2小时